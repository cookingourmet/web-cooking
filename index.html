    <!--
      SEO dinámico por ruta.
      Se ejecuta antes de cargar la aplicación.
    -->
    <script>
      (() => {
        const BASE_URL = "https://www.cookingourmet.edu.pe";

        const DEFAULT_SEO = {
          title:
            "Escuela de Gastronomía en Huancayo | Cooking Gourmet",
          description:
            "Estudia Gastronomía, Pastelería, Bar Profesional, Barismo, Sommelier y Cocina Acelerada en Huancayo. Formación práctica y 100% presencial.",
          image:
            "/images/portada/gastronomia.jpg",
          imageAlt:
            "Cooking Gourmet, Escuela de Gastronomía en Huancayo",
          pageName:
            "Escuela de Gastronomía en Huancayo",
          course: null
        };

        const SEO_BY_PATH = {
          "/programas/gastronomia": {
            title:
              "Gastronomía Profesional en Huancayo | Cooking Gourmet",
            description:
              "Estudia Gastronomía Profesional en Huancayo. Formación presencial de 18 meses, clases prácticas, cocina nacional e internacional y chefs expertos.",
            image:
              "/images/portada/gastronomia.jpg",
            imageAlt:
              "Estudiante de Gastronomía Profesional en Cooking Gourmet Huancayo",
            pageName:
              "Gastronomía Profesional en Huancayo",
            course: {
              name: "Gastronomía Profesional",
              duration: "18 meses"
            }
          },

          "/programas/pasteleria": {
            title:
              "Pastelería Profesional en Huancayo | Cooking Gourmet",
            description:
              "Estudia Panadería y Pastelería Profesional en Huancayo. Aprende postres, tortas, masas y técnicas modernas en modalidad 100% presencial.",
            image:
              "/images/portada/pasteleria.jpg",
            imageAlt:
              "Programa de Pastelería Profesional en Cooking Gourmet Huancayo",
            pageName:
              "Pastelería Profesional en Huancayo",
            course: {
              name: "Panadería y Pastelería Profesional",
              duration: "1 año"
            }
          },

          "/programas/bar-profesional": {
            title:
              "Bar Profesional en Huancayo | Cooking Gourmet",
            description:
              "Estudia Bar Profesional en Huancayo. Aprende coctelería clásica y moderna, mixología, servicio de barra y preparación profesional de bebidas.",
            image:
              "/images/portada/bar-profesional.jpg",
            imageAlt:
              "Programa de Bar Profesional y Coctelería en Huancayo",
            pageName:
              "Bar Profesional en Huancayo",
            course: {
              name: "Bar Profesional",
              duration: "6 meses"
            }
          },

          "/programas/barismo": {
            title:
              "Barismo Profesional en Huancayo | Cooking Gourmet",
            description:
              "Estudia Barismo Profesional en Huancayo. Aprende café de especialidad, métodos de preparación, extracción y técnicas de arte latte.",
            image:
              "/images/portada/barismo.jpg",
            imageAlt:
              "Programa de Barismo Profesional en Cooking Gourmet Huancayo",
            pageName:
              "Barismo Profesional en Huancayo",
            course: {
              name: "Barismo Profesional",
              duration: "3 meses"
            }
          },

          "/programas/sommelier": {
            title:
              "Sommelier Profesional en Huancayo | Cooking Gourmet",
            description:
              "Estudia Sommelier Profesional en Huancayo. Aprende cata de vinos, maridaje, servicio especializado y cultura del vino.",
            image:
              "/images/portada/sommelier.jpg",
            imageAlt:
              "Programa de Sommelier Profesional en Cooking Gourmet Huancayo",
            pageName:
              "Sommelier Profesional en Huancayo",
            course: {
              name: "Sommelier Profesional",
              duration: "6 meses"
            }
          },

          "/programas/cocina-acelerada": {
            title:
              "Cocina Acelerada en Huancayo | Cooking Gourmet",
            description:
              "Estudia Cocina Acelerada en Huancayo. Aprende técnicas culinarias profesionales en 6 meses mediante formación práctica e intensiva.",
            image:
              "/images/portada/cocina.jpg",
            imageAlt:
              "Programa de Cocina Acelerada en Cooking Gourmet Huancayo",
            pageName:
              "Cocina Acelerada en Huancayo",
            course: {
              name: "Cocina Acelerada",
              duration: "6 meses"
            }
          }
        };

        const normalizedPath =
          window.location.pathname === "/"
            ? "/"
            : window.location.pathname.replace(/\/+$/, "");

        const seo =
          SEO_BY_PATH[normalizedPath] ??
          DEFAULT_SEO;

        const canonicalUrl =
          normalizedPath === "/"
            ? `${BASE_URL}/`
            : `${BASE_URL}${normalizedPath}`;

        const absoluteImage =
          `${BASE_URL}${seo.image}`;

        const setMeta = (
          selector,
          attribute,
          value
        ) => {
          let element =
            document.head.querySelector(selector);

          if (!element) {
            element =
              document.createElement("meta");

            document.head.appendChild(element);
          }

          element.setAttribute(
            attribute,
            value
          );
        };

        const setCanonical = (url) => {
          let canonical =
            document.head.querySelector(
              'link[rel="canonical"]'
            );

          if (!canonical) {
            canonical =
              document.createElement("link");

            canonical.setAttribute(
              "rel",
              "canonical"
            );

            document.head.appendChild(
              canonical
            );
          }

          canonical.setAttribute(
            "href",
            url
          );
        };

        document.title = seo.title;

        setMeta(
          'meta[name="description"]',
          "content",
          seo.description
        );

        setCanonical(canonicalUrl);

        setMeta(
          'meta[property="og:title"]',
          "content",
          seo.title
        );

        setMeta(
          'meta[property="og:description"]',
          "content",
          seo.description
        );

        setMeta(
          'meta[property="og:url"]',
          "content",
          canonicalUrl
        );

        setMeta(
          'meta[property="og:image"]',
          "content",
          absoluteImage
        );

        setMeta(
          'meta[property="og:image:alt"]',
          "content",
          seo.imageAlt
        );

        setMeta(
          'meta[name="twitter:title"]',
          "content",
          seo.title
        );

        setMeta(
          'meta[name="twitter:description"]',
          "content",
          seo.description
        );

        setMeta(
          'meta[name="twitter:image"]',
          "content",
          absoluteImage
        );

        const organization = {
          "@type": [
            "EducationalOrganization",
            "LocalBusiness"
          ],
          "@id":
            `${BASE_URL}/#organization`,
          "name": "Cooking Gourmet",
          "alternateName":
            "Cooking Gourmet Escuela de Alta Cocina",
          "description":
            "Escuela de gastronomía y alta cocina en Huancayo con formación presencial.",
          "url": `${BASE_URL}/`,
          "logo":
            `${BASE_URL}/logo.png`,
          "image":
            `${BASE_URL}/images/portada/gastronomia.jpg`,
          "telephone":
            "+51 981 377 382",
          "email":
            "ventas@cookingourmet.edu.pe",
          "address": {
            "@type":
              "PostalAddress",
            "addressLocality":
              "Huancayo",
            "addressRegion":
              "Junín",
            "addressCountry":
              "PE"
          },
          "areaServed": {
            "@type": "City",
            "name": "Huancayo"
          },
          "contactPoint": {
            "@type":
              "ContactPoint",
            "telephone":
              "+51 981 377 382",
            "contactType":
              "admisiones",
            "areaServed": "PE",
            "availableLanguage":
              "Spanish"
          }
        };

        const website = {
          "@type": "WebSite",
          "@id":
            `${BASE_URL}/#website`,
          "url": `${BASE_URL}/`,
          "name": "Cooking Gourmet",
          "publisher": {
            "@id":
              `${BASE_URL}/#organization`
          },
          "inLanguage": "es-PE"
        };

        const webpage = {
          "@type": "WebPage",
          "@id":
            `${canonicalUrl}#webpage`,
          "url": canonicalUrl,
          "name": seo.pageName,
          "description":
            seo.description,
          "isPartOf": {
            "@id":
              `${BASE_URL}/#website`
          },
          "about": {
            "@id":
              `${BASE_URL}/#organization`
          },
          "primaryImageOfPage": {
            "@type":
              "ImageObject",
            "url": absoluteImage
          },
          "inLanguage": "es-PE"
        };

        const graph = [
          organization,
          website,
          webpage
        ];

        if (seo.course) {
          graph.push({
            "@type": "Course",
            "@id":
              `${canonicalUrl}#course`,
            "name":
              seo.course.name,
            "description":
              seo.description,
            "url":
              canonicalUrl,
            "provider": {
              "@id":
                `${BASE_URL}/#organization`
            },
            "inLanguage":
              "es-PE",
            "hasCourseInstance": {
              "@type":
                "CourseInstance",
              "courseMode":
                "Presencial",
              "location": {
                "@type":
                  "Place",
                "name":
                  "Cooking Gourmet",
                "address": {
                  "@type":
                    "PostalAddress",
                  "addressLocality":
                    "Huancayo",
                  "addressRegion":
                    "Junín",
                  "addressCountry":
                    "PE"
                }
              }
            }
          });
        }

        const jsonLd =
          document.createElement(
            "script"
          );

        jsonLd.type =
          "application/ld+json";

        jsonLd.textContent =
          JSON.stringify({
            "@context":
              "https://schema.org",
            "@graph": graph
          });

        document.head.appendChild(
          jsonLd
        );
      })();
    </script>
  </head>
