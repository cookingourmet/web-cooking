            pageName:
              "Contacto",
            pageType:

            course: null

          window.location.pathname === "/"
            ? "/"

        const seo =
          SEO_BY_PATH[normalizedPath] || DEFAULT_SEO;

        const canonicalUrl =
          normalizedPath === "/"
            ? `${BASE_URL}/`
            : `${BASE_URL}${normalizedPath}`;

        const absoluteImage =
          seo.image.startsWith("http")
            ? seo.image
            : `${BASE_URL}${seo.image}`;

        const absoluteLogo =
          `${BASE_URL}${LOGO_IMAGE}`;

        const upsertMeta = (attributeName, attributeValue, content) => {
          let element =
            document.head.querySelector(
              `meta[${attributeName}="${attributeValue}"]`
            );

          if (!element) {
            element =
              document.createElement("meta");

            element.setAttribute(
              attributeName,
              attributeValue
            );

            document.head.appendChild(element);
          }

          element.setAttribute("content", content);
        };

        const setCanonical = (url) => {
          let canonical =
            document.head.querySelector('link[rel="canonical"]');

          if (!canonical) {
            canonical =
              document.createElement("link");

            canonical.setAttribute("rel", "canonical");
            document.head.appendChild(canonical);
          }

          canonical.setAttribute("href", url);
        };

        const setAlternate = (hreflang, url) => {
          let alternate =
            document.head.querySelector(
              `link[rel="alternate"][hreflang="${hreflang}"]`
            );

          if (!alternate) {
            alternate =
              document.createElement("link");

            alternate.setAttribute("rel", "alternate");
            alternate.setAttribute("hreflang", hreflang);
            document.head.appendChild(alternate);
          }

          alternate.setAttribute("href", url);
        };

        document.title = seo.title;

        upsertMeta(
          "name",
          "description",
          seo.description
        );

        upsertMeta(
          "name",
          "robots",
          "index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"
        );

        setCanonical(canonicalUrl);
        setAlternate("es-PE", canonicalUrl);
        setAlternate("x-default", canonicalUrl);

        upsertMeta(
          "property",
          "og:type",
          "website"
        );

        upsertMeta(
          "property",
          "og:locale",
          "es_PE"
        );

        upsertMeta(
          "property",
          "og:site_name",
          "Cooking Gourmet"
        );

        upsertMeta(
          "property",
          "og:title",
          seo.title
        );

        upsertMeta(
          "property",
          "og:description",
          seo.description
        );

        upsertMeta(
          "property",
          "og:url",
          canonicalUrl
        );

        upsertMeta(
          "property",
          "og:image",
          absoluteImage
        );

        upsertMeta(
          "property",
          "og:image:secure_url",
          absoluteImage
        );

        upsertMeta(
          "property",
          "og:image:width",
          "1200"
        );

        upsertMeta(
          "property",
          "og:image:height",
          "630"
        );

        upsertMeta(
          "property",
          "og:image:alt",
          seo.imageAlt
        );

        upsertMeta(
          "name",
          "twitter:card",
          "summary_large_image"
        );

        upsertMeta(
          "name",
          "twitter:title",
          seo.title
        );

        upsertMeta(
          "name",
          "twitter:description",
          seo.description
        );

        upsertMeta(
          "name",
          "twitter:image",
          absoluteImage
        );

        upsertMeta(
          "name",
          "twitter:image:alt",
          seo.imageAlt

        document
          .querySelectorAll(
            'script[data-seo-schema="base"]'
          )
          .forEach((script) => script.remove());

            "LocalBusiness"

            `${BASE_URL}/#organization`,
          "name":

            `${BASE_URL}${DEFAULT_IMAGE}`,

            "+51 981 377 382",
          "email":
            "ventas@cookingourmet.edu.pe",

            "$$",

              "PostalAddress",
            "streetAddress":
              "Av. Ferrocarril 587",
            "addressLocality":

            "addressRegion":

            "addressCountry":

          "url":
            `${BASE_URL}/`,
          "name":
            "Cooking Gourmet",
          "publisher": {
            "@id":
              `${BASE_URL}/#organization`
          },
          "inLanguage":
            "es-PE"
        };

        const webpage = {
          "@type":
            seo.pageType || "WebPage",
          "@id":
            `${canonicalUrl}#webpage`,
          "url":
            canonicalUrl,
          "name":
            seo.pageName,
          "headline":
            seo.title,
          "description":

            "name":
              "Inicio",

              "ListItem",

              2,
            "name":
              seo.pageName,

              canonicalUrl
          });

        const breadcrumb = {
          "@type":

          "@id":
            `${canonicalUrl}#breadcrumb`,
          "itemListElement":
            breadcrumbItems
        };

        const graph = [
          organization,
          website,
          webpage,
          breadcrumb
        ];

        if (seo.course) {
          const course = {
            "@type":
              "Course",
            "@id":
              `${canonicalUrl}#course`,
            "name":
              seo.course.name,
            "description":
              seo.description,
            "url":
              canonicalUrl,
            "image":
              absoluteImage,
            "provider": {
              "@id":
                `${BASE_URL}/#organization`
            },
            "inLanguage":
              "es-PE",
            "teaches":
              seo.course.teaches || undefined,
            "hasCourseInstance": {

                  "streetAddress":

                  "addressLocality":
                    "Huancayo",
                  "addressRegion":
                    "Junín",
                  "addressCountry":

          if (seo.course.instructor) {
            course.instructor = {
              "@type":

            };
          }

          graph.push(course);

        const jsonLd =
          document.createElement("script");

        jsonLd.type =
          "application/ld+json";

        jsonLd.dataset.seoSchema =
          "base";

        jsonLd.textContent =
          JSON.stringify({
            "@context":
              "https://schema.org",
            "@graph":
              graph
          });

        document.head.appendChild(jsonLd);
      })();
